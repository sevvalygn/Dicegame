<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>World Series of Dice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      min-height: 100vh;
      background: #2d2d2d;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .player-name-row {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .player-name-row label { font-size: 0.85rem; color: rgba(255,255,255,0.7); }
    .player-name-row input {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.08);
      color: #fff;
      font-size: 0.9rem;
      width: 120px;
    }
    .result {
      font-family: Caveat, cursive;
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 28px;
      color: #f5f0e6;
      font-style: italic;
      min-height: 48px;
    }
    .result.idle { color: rgba(255,255,255,0.5); font-size: 1.5rem; }
    .result.win { color: #86efac; }
    .result.lose { color: #fca5a5; }
    .result.draw { color: #fde047; }
    .arena {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 48px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }
    .player-box {
      text-align: center;
    }
    .player-box .name {
      font-family: Caveat, cursive;
      font-size: 1.75rem;
      font-weight: 700;
      color: #7dd3b0;
      margin-bottom: 16px;
    }
    .player-box .dice-wrap {
      width: 120px;
      height: 120px;
      margin: 0 auto;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 6px 24px rgba(0,0,0,0.4);
    }
    .player-box .dice-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .player-box .value { font-size: 0.85rem; color: rgba(255,255,255,0.6); margin-top: 6px; }
    .btn {
      width: 64px;
      height: 64px;
      padding: 0;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: #4ecdc4;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s, background 0.2s;
      box-shadow: 0 4px 16px rgba(78, 205, 196, 0.4);
    }
    .btn:hover:not(:disabled) { background: #3dbdb5; transform: scale(1.05); }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .btn svg { width: 28px; height: 28px; }
    .footer {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
    }
    .footer .dicee { display: inline-flex; align-items: center; }
    .footer .dicee .dice-ico { font-size: 0.9em; margin: 0 1px; }
  </style>
</head>
<body>
  <div class="player-name-row">
    <label for="p1-name">Player 1:</label>
    <input type="text" id="p1-name" value="Player 1" maxlength="20" placeholder="Adınız" />
  </div>

  <div class="result idle" id="result">Zar atmak için butona basın.</div>

  <div class="arena">
    <div class="player-box">
      <div class="name" id="label-p1">Player 1</div>
      <div class="dice-wrap"><img id="dice-p1" src="assets/dice1.png" alt="Zar 1" /></div>
      <div class="value" id="value-p1">—</div>
    </div>
    <div class="player-box">
      <div class="name" id="label-p2">Player 2</div>
      <div class="dice-wrap"><img id="dice-p2" src="assets/dice1.png" alt="Zar 2" /></div>
      <div class="value" id="value-p2">—</div>
    </div>
  </div>

  <button class="btn" id="btn-roll" title="Zar at" aria-label="Zar at">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
  </button>

  <footer class="footer">www <span class="dicee">Dice<span class="dice-ico">🎲</span>e</span> Game .com</footer>

  <script>
    (function () {
      const DICE_IMGS = [
        'assets/dice1.png',
        'assets/dice2.png',
        'assets/dice3.png',
        'assets/dice4.png',
        'assets/dice5.png',
        'assets/dice6.png'
      ];
      const ANIMATION_DURATION = 3000;
      const ANIMATION_INTERVAL = 80;

      const p1NameInput = document.getElementById('p1-name');
      const labelP1 = document.getElementById('label-p1');
      const diceP1 = document.getElementById('dice-p1');
      const valueP1 = document.getElementById('value-p1');
      const diceP2 = document.getElementById('dice-p2');
      const valueP2 = document.getElementById('value-p2');
      const resultEl = document.getElementById('result');
      const btnRoll = document.getElementById('btn-roll');

      p1NameInput.addEventListener('input', function () {
        const name = this.value.trim() || 'Player 1';
        labelP1.textContent = name;
      });

      function randomFace() {
        return Math.floor(Math.random() * 6) + 1;
      }

      function setDiceFace(imgEl, value) {
        imgEl.src = DICE_IMGS[value - 1];
      }

      function showResult(v1, v2) {
        const p1Name = p1NameInput.value.trim() || 'Player 1';
        valueP1.textContent = v1;
        valueP2.textContent = v2;
        setDiceFace(diceP1, v1);
        setDiceFace(diceP2, v2);

        resultEl.classList.remove('win', 'lose', 'draw', 'idle');
        if (v1 > v2) {
          resultEl.classList.add('win');
          resultEl.textContent = p1Name + ' Wins! 🏆';
        } else if (v1 < v2) {
          resultEl.classList.add('lose');
          resultEl.textContent = 'Player 2 Wins! 😔';
        } else {
          resultEl.classList.add('draw');
          resultEl.textContent = 'Draw! 🤝';
        }
        btnRoll.disabled = false;
      }

      btnRoll.addEventListener('click', function () {
        btnRoll.disabled = true;
        resultEl.classList.remove('win', 'lose', 'draw');
        resultEl.classList.add('idle');
        resultEl.textContent = 'Zarlar atılıyor...';
        valueP1.textContent = '?';
        valueP2.textContent = '?';

        const final1 = randomFace();
        const final2 = randomFace();
        let elapsed = 0;

        const anim = setInterval(function () {
          setDiceFace(diceP1, randomFace());
          setDiceFace(diceP2, randomFace());
          elapsed += ANIMATION_INTERVAL;
          if (elapsed >= ANIMATION_DURATION) {
            clearInterval(anim);
            showResult(final1, final2);
          }
        }, ANIMATION_INTERVAL);
      });
    })();
  </script>
</body>
</html>
